version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: monitoring_timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with existing PostgreSQL 18
    environment:
      POSTGRES_USER: monitoring_man
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: monitoring_db
      # TimescaleDB tuning
      TIMESCALEDB_TELEMETRY: 'off'
      # PostgreSQL performance tuning
      POSTGRES_SHARED_BUFFERS: '2GB'
      POSTGRES_EFFECTIVE_CACHE_SIZE: '6GB'
      POSTGRES_MAINTENANCE_WORK_MEM: '512MB'
      POSTGRES_WORK_MEM: '64MB'
      POSTGRES_MAX_CONNECTIONS: '100'
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts:/scripts:ro  # Mount scripts directory for easy access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring_man -d monitoring_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
      - -c
      - max_connections=100
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - work_mem=64MB
      - -c
      - timescaledb.max_background_workers=8
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - max_parallel_workers=8
      - -c
      - max_worker_processes=16
      - -c
      - wal_compression=on
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      # High-write tuning for 15s monitoring intervals (~1.15M rows/day per 200 devices)
      - -c
      - checkpoint_completion_target=0.9   # spread checkpoint I/O over 90% of interval
      - -c
      - wal_buffers=64MB                   # larger WAL buffer reduces fsync stalls
      - -c
      - min_wal_size=1GB                   # avoid WAL file recycling churn
      - -c
      - max_wal_size=4GB                   # allow larger WAL before forced checkpoint
      - -c
      - autovacuum_vacuum_scale_factor=0.05  # vacuum sooner on large tables (5% vs 20%)
      - -c
      - autovacuum_analyze_scale_factor=0.02 # analyze sooner for planner accuracy
      - -c
      - autovacuum_max_workers=4           # more workers for concurrent table maintenance
      - -c
      - default_statistics_target=100      # better query plans for time-series queries

  redis:
    image: redis:7-alpine
    container_name: monitoring_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - monitoring_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  timescaledb_data:
    driver: local
  monitoring_redis_data:
    driver: local

networks:
  default:
    name: monitoring_network
