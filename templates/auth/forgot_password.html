{% extends "base.html" %}

{% block title %}Password Recovery — NMS{% endblock %}

{% block extra_css %}
<style>
    /* ── Full-page takeover ─────────────────────────────────────── */
    body { background: #040810 !important; overflow: hidden; }

    /* ── Aurora background ──────────────────────────────────────── */
    #login-aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background: radial-gradient(ellipse 90% 70% at 50% 50%, #070e1e 0%, #040810 100%);
    }

    /* Grain texture overlay */
    #login-aurora::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.032'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 10;
    }

    /* Centered orbs — same system as login */
    .aurora-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        will-change: transform;
    }
    .aurora-orb:nth-child(1) {
        width: 580px; height: 580px;
        background: radial-gradient(circle at 50% 50%, rgba(0,212,170,0.21), transparent 64%);
        top: 50%; left: 50%;
        transform: translate(-75%, -58%);
        animation: orb1 22s ease-in-out infinite;
    }
    .aurora-orb:nth-child(2) {
        width: 480px; height: 480px;
        background: radial-gradient(circle at 50% 50%, rgba(48,90,210,0.19), transparent 64%);
        top: 50%; left: 50%;
        transform: translate(8%, -48%);
        animation: orb2 28s ease-in-out infinite;
    }
    .aurora-orb:nth-child(3) {
        width: 440px; height: 440px;
        background: radial-gradient(circle at 50% 50%, rgba(85,45,195,0.15), transparent 64%);
        top: 50%; left: 50%;
        transform: translate(-58%, 18%);
        animation: orb3 20s ease-in-out infinite;
    }
    .aurora-orb:nth-child(4) {
        width: 300px; height: 300px;
        background: radial-gradient(circle at 50% 50%, rgba(0,175,195,0.11), transparent 64%);
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        animation: orb4 13s ease-in-out infinite;
    }
    @keyframes orb1 {
        0%,100% { transform: translate(-75%, -58%) scale(1); }
        40%      { transform: translate(-65%, -48%) scale(1.06); }
        70%      { transform: translate(-80%, -62%) scale(0.94); }
    }
    @keyframes orb2 {
        0%,100% { transform: translate(8%, -48%) scale(1); }
        35%      { transform: translate(-2%, -55%) scale(1.08); }
        70%      { transform: translate(14%, -40%) scale(0.95); }
    }
    @keyframes orb3 {
        0%,100% { transform: translate(-58%, 18%) scale(1); }
        50%      { transform: translate(-48%, 10%) scale(1.07); }
    }
    @keyframes orb4 {
        0%,100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
        50%      { transform: translate(-50%, -50%) scale(1.18); opacity: 0.75; }
    }

    /* Scan shimmer */
    #login-aurora-scan {
        position: fixed;
        top: 0; left: -60%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0,212,170,0.016), transparent);
        animation: scan 10s linear infinite;
        z-index: 5;
        pointer-events: none;
    }
    @keyframes scan { 0% { left: -55%; } 100% { left: 110%; } }

    /* ── App header — unified with aurora layer ─────────────────── */
    .app-header {
        background: rgba(4, 8, 16, 0.72) !important;
        backdrop-filter: blur(22px) saturate(1.5) !important;
        -webkit-backdrop-filter: blur(22px) saturate(1.5) !important;
        border-bottom: 1px solid rgba(0,212,170,0.11) !important;
        box-shadow:
            0 1px 0 rgba(0,212,170,0.07),
            0 6px 28px rgba(0,0,0,0.45) !important;
        z-index: 200 !important;
    }
    .app-header::after {
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(0,212,170,0.48) 35%,
            rgba(56,100,220,0.38) 65%,
            transparent 100%) !important;
        opacity: 0.65 !important;
        height: 1px !important;
    }

    /* ── Container ──────────────────────────────────────────────── */
    .container-fluid.tactical-theme {
        background: transparent !important;
        position: relative;
        z-index: 1;
        min-height: 100vh;
    }

    /* ── Card entrance ──────────────────────────────────────────── */
    @keyframes cardReveal {
        0%   { opacity: 0; transform: translateY(8px) scale(0.990); filter: blur(3px); }
        100% { opacity: 1; transform: translateY(0)   scale(1);     filter: blur(0); }
    }

    /* ── Login card — elevated glass ────────────────────────────── */
    .auth-card.enterprise-card {
        background: rgba(8, 14, 28, 0.87) !important;
        backdrop-filter: blur(34px) saturate(1.9) !important;
        -webkit-backdrop-filter: blur(34px) saturate(1.9) !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
        box-shadow:
            0 0 0 1px rgba(0,212,170,0.11),
            inset 0 1px 0 rgba(255,255,255,0.05),
            0 24px 60px rgba(0,0,0,0.75),
            0 56px 130px rgba(0,0,0,0.50),
            0 0 70px rgba(0,212,170,0.055) !important;
        animation: cardReveal 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .auth-card.enterprise-card::before {
        content: '';
        display: block;
        height: 2px;
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(0,212,170,0.90) 32%,
            rgba(56,115,255,0.72) 68%,
            transparent 100%);
        border-radius: 8px 8px 0 0;
    }

    /* ── Card branding header ───────────────────────────────────── */
    .auth-header-brand {
        text-align: center;
        padding: 26px 24px 14px;
    }
    .auth-noc-icon {
        width: 46px; height: 46px;
        background: rgba(0,212,170,0.08);
        border: 1px solid rgba(0,212,170,0.25);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 10px;
        color: #00d4aa;
        box-shadow: 0 0 18px rgba(0,212,170,0.18), 0 0 0 4px rgba(0,212,170,0.05);
    }
    .auth-noc-icon [data-lucide] { width: 20px; height: 20px; stroke-width: 1.8; }
    .auth-title {
        font-family: 'Orbitron', monospace !important;
        font-size: 0.92rem !important;
        font-weight: 700 !important;
        letter-spacing: 0.20em !important;
        text-transform: uppercase;
        color: #dde8f8 !important;
        margin-bottom: 5px;
        line-height: 1.35;
    }
    .auth-subtitle {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.60rem;
        letter-spacing: 0.15em;
        color: rgba(130,150,185,0.50) !important;
        text-transform: uppercase;
        margin-bottom: 0;
    }

    /* ── Alert ──────────────────────────────────────────────────── */
    .auth-card .alert-danger {
        background: rgba(200,40,55,0.08) !important;
        border: 1px solid rgba(200,40,55,0.18) !important;
        color: rgba(255,130,145,0.80) !important;
        font-size: 0.75rem;
        border-radius: 7px;
        padding: 9px 13px;
        margin-bottom: 20px;
        box-shadow: none !important;
    }

    /* ── Form label ─────────────────────────────────────────────── */
    .auth-card .form-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.63rem !important;
        letter-spacing: 0.12em;
        color: rgba(150,170,205,0.65) !important;
        text-transform: uppercase;
        margin-bottom: 8px;
    }

    /* ── Input ──────────────────────────────────────────────────── */
    .auth-card .tactical-input {
        background: rgba(255,255,255,0.035) !important;
        border: 1px solid rgba(255,255,255,0.09) !important;
        color: rgba(255,255,255,0.85) !important;
        border-radius: 7px !important;
        height: 44px;
        font-size: 0.875rem;
        padding: 0 14px;
        box-shadow: inset 0 1px 4px rgba(0,0,0,0.28) !important;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .auth-card .tactical-input::placeholder { color: rgba(130,150,185,0.30); }
    .auth-card .tactical-input:focus {
        border-color: rgba(0,212,170,0.48) !important;
        box-shadow:
            inset 0 1px 4px rgba(0,0,0,0.22),
            0 0 0 3px rgba(0,212,170,0.13) !important;
        background: rgba(0,212,170,0.035) !important;
        outline: none;
    }

    /* ── Primary button (same as login .btn-login) ──────────────── */
    .auth-card .btn-login {
        background: linear-gradient(135deg, #00d4aa 0%, #00a886 100%);
        border: none;
        color: #030c18;
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 700;
        font-size: 0.76rem;
        letter-spacing: 0.20em;
        text-transform: uppercase;
        width: 100%;
        height: 46px;
        border-radius: 7px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        box-shadow:
            0 4px 16px rgba(0,212,170,0.20),
            inset 0 1px 0 rgba(255,255,255,0.22);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .auth-card .btn-login::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 55%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
        transition: left 0.55s ease;
        pointer-events: none;
    }
    .auth-card .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,212,170,0.30), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .auth-card .btn-login:hover::before { left: 140%; }
    .auth-card .btn-login:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(0,212,170,0.20);
    }

    /* ── Back to login link ─────────────────────────────────────── */
    .auth-back {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 14px;
        font-size: 0.68rem;
        color: rgba(120,140,175,0.42) !important;
        text-decoration: none;
        letter-spacing: 0.06em;
        transition: color 0.15s ease;
        font-family: 'IBM Plex Mono', monospace;
    }
    .auth-back::before,
    .auth-back::after {
        content: '';
        display: block;
        height: 1px;
        width: 28px;
        background: rgba(255,255,255,0.07);
    }
    .auth-back:hover { color: rgba(0,212,170,0.65) !important; }
    .auth-back [data-lucide] { width: 11px; height: 11px; stroke-width: 2; opacity: 0.6; }

    /* ════════════════════════════════════════════════════════════
       LIGHT THEME
       ════════════════════════════════════════════════════════════ */

    html[data-theme="light"] body { background: #eef2f9 !important; }

    html[data-theme="light"] #login-aurora {
        background: linear-gradient(145deg, #f0f5fc 0%, #eaf0fb 45%, #f3f5fd 100%);
    }
    html[data-theme="light"] #login-aurora::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(30,80,180,0.07) 1px, transparent 1px);
        background-size: 26px 26px;
        pointer-events: none;
        z-index: 1;
    }
    html[data-theme="light"] #login-aurora::after { opacity: 0.012; }

    html[data-theme="light"] .aurora-orb:nth-child(1) {
        background: radial-gradient(circle at 50% 50%, rgba(0,175,145,0.11), transparent 64%);
    }
    html[data-theme="light"] .aurora-orb:nth-child(2) {
        background: radial-gradient(circle at 50% 50%, rgba(55,110,220,0.09), transparent 64%);
    }
    html[data-theme="light"] .aurora-orb:nth-child(3) {
        background: radial-gradient(circle at 50% 50%, rgba(115,75,200,0.07), transparent 64%);
    }
    html[data-theme="light"] .aurora-orb:nth-child(4) {
        background: radial-gradient(circle at 50% 50%, rgba(0,160,190,0.08), transparent 64%);
    }
    html[data-theme="light"] #login-aurora-scan {
        background: linear-gradient(90deg, transparent, rgba(0,175,145,0.025), transparent);
    }

    html[data-theme="light"] .app-header {
        background: rgba(248,251,255,0.88) !important;
        border-bottom: 1px solid rgba(0,150,120,0.10) !important;
        box-shadow: 0 1px 0 rgba(0,150,120,0.07), 0 4px 18px rgba(0,0,0,0.05) !important;
    }
    html[data-theme="light"] .app-header::after {
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(0,155,125,0.32) 35%,
            rgba(55,100,185,0.24) 65%,
            transparent 100%) !important;
        opacity: 0.8 !important;
    }

    html[data-theme="light"] .auth-card.enterprise-card {
        background: rgba(255,255,255,0.92) !important;
        backdrop-filter: blur(28px) saturate(1.4) !important;
        -webkit-backdrop-filter: blur(28px) saturate(1.4) !important;
        border: 1px solid rgba(0,0,0,0.065) !important;
        box-shadow:
            0 0 0 1px rgba(0,150,120,0.07),
            inset 0 1px 0 rgba(255,255,255,0.95),
            0 8px 28px rgba(0,0,0,0.07),
            0 28px 64px rgba(0,0,0,0.05),
            0 0 50px rgba(0,155,125,0.04) !important;
    }
    html[data-theme="light"] .auth-card.enterprise-card::before {
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(0,155,125,0.70) 32%,
            rgba(55,105,205,0.55) 68%,
            transparent 100%);
    }
    html[data-theme="light"] .auth-noc-icon {
        background: rgba(0,155,125,0.08);
        border-color: rgba(0,155,125,0.22);
        color: #009d82;
        box-shadow: 0 0 16px rgba(0,155,125,0.12), 0 0 0 4px rgba(0,155,125,0.05);
    }
    html[data-theme="light"] .auth-title  { color: #192038 !important; }
    html[data-theme="light"] .auth-subtitle { color: rgba(55,75,110,0.46) !important; }

    html[data-theme="light"] .auth-card .alert-danger {
        background: rgba(200,35,50,0.06) !important;
        border-color: rgba(200,35,50,0.15) !important;
        color: rgba(175,25,45,0.80) !important;
    }
    html[data-theme="light"] .auth-card .form-label {
        color: rgba(55,75,110,0.60) !important;
    }
    html[data-theme="light"] .auth-card .tactical-input {
        background: rgba(0,0,0,0.02) !important;
        border-color: rgba(0,0,0,0.10) !important;
        color: rgba(10,20,45,0.85) !important;
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.05) !important;
    }
    html[data-theme="light"] .auth-card .tactical-input::placeholder {
        color: rgba(55,75,110,0.28) !important;
    }
    html[data-theme="light"] .auth-card .tactical-input:focus {
        border-color: rgba(0,155,125,0.42) !important;
        box-shadow:
            inset 0 1px 3px rgba(0,0,0,0.04),
            0 0 0 3px rgba(0,155,125,0.10) !important;
        background: rgba(0,155,125,0.025) !important;
    }

    html[data-theme="light"] .auth-back {
        color: rgba(55,75,110,0.36) !important;
    }
    html[data-theme="light"] .auth-back::before,
    html[data-theme="light"] .auth-back::after { background: rgba(0,0,0,0.08); }
    html[data-theme="light"] .auth-back:hover { color: rgba(0,155,125,0.68) !important; }
</style>
{% endblock %}

{% block content %}
<div id="login-aurora">
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
</div>
<div id="login-aurora-scan"></div>

<div class="container-fluid tactical-theme">
    <div class="auth-wrapper">

        <div class="card enterprise-card auth-card">

            <!-- Branding -->
            <div class="auth-header-brand">
                <div class="auth-noc-icon">
                    <i data-lucide="mail"></i>
                </div>
                <div class="auth-title">Password Recovery</div>
                <div class="auth-subtitle">We'll send a reset code to your email</div>
            </div>

            <div class="card-body px-4 pb-4 pt-2">

                {% if error %}
                <div class="alert alert-danger small">
                    <i class="fas fa-exclamation-triangle me-2" style="opacity:0.65"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('auth_bp.forgot_password') }}">

                    <div class="mb-5">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control tactical-input"
                            id="email" name="email" required autocomplete="email">
                    </div>

                    <button type="submit" class="btn-login">
                        Send Reset Code
                    </button>

                </form>

                <a href="{{ url_for('auth_bp.login') }}" class="auth-back">
                    <i data-lucide="arrow-left"></i>
                    Back to Sign In
                </a>

            </div>
        </div>

    </div>
</div>
{% endblock %}
