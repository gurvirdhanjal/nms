<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied — NMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/tactical.css') }}?v=4" rel="stylesheet">
    <script>
        (function () {
            const saved = localStorage.getItem('nms-ui-theme');
            document.documentElement.setAttribute('data-theme', saved || 'dark');
        })();
    </script>
    <style>
        body {
            background: var(--ui-bg);
            color: var(--ui-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .error-card {
            background: var(--ui-surface-2);
            border: 1px solid var(--ui-danger, #ff4757);
            border-radius: 8px;
            padding: 2.5rem 3rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 32px rgba(255, 71, 87, 0.12);
        }

        .error-icon {
            font-size: 3rem;
            color: var(--ui-danger, #ff4757);
            margin-bottom: 1rem;
        }

        .error-code {
            font-family: 'Orbitron', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: var(--ui-danger, #ff4757);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ui-text);
            margin-bottom: 0.75rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .error-desc {
            color: var(--ui-text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .btn-action {
            background: var(--ui-danger, #ff4757);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.55rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.15s;
            margin: 0 0.25rem;
        }

        .btn-action:hover {
            opacity: 0.85;
            color: #fff;
        }

        .btn-action-ghost {
            background: transparent;
            color: var(--ui-text-muted);
            border: 1px solid var(--ui-border, rgba(255,255,255,0.1));
            border-radius: 4px;
            padding: 0.55rem 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.15s;
            margin: 0 0.25rem;
        }

        .btn-action-ghost:hover {
            opacity: 0.75;
            color: var(--ui-text-muted);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="fas fa-lock"></i></div>
        <div class="error-code">403</div>
        <div class="error-title">Access Denied</div>
        <p class="error-desc">
            You don't have permission to access this resource.<br>
            Contact your administrator if you believe this is an error.
        </p>
        <a href="{{ url_for('auth_bp.login') }}" class="btn-action">
            <i class="fas fa-sign-in-alt me-1"></i> Sign In
        </a>
        <a href="javascript:history.back()" class="btn-action-ghost">
            <i class="fas fa-arrow-left me-1"></i> Go Back
        </a>
    </div>
</body>
</html>
