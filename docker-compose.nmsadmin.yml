version: "3.9"

# ============================================================
# NMS Admin Panel — Production Docker Stack
#
# Services:
#   db        TimescaleDB 2.x  (PostgreSQL 16 + TimescaleDB)
#   redis     Redis 7           (caching, rate limiting, SSE)
#   app       NMS Admin Panel   (Flask + Waitress, port 5000)
#
# Usage:
#   1. Copy .env.docker.example to .env.docker and fill in secrets
#   2. docker compose -f docker-compose.nmsadmin.yml up -d
#   3. Open http://<host>:5000
#
# First run:
#   docker compose -f docker-compose.nmsadmin.yml exec app \
#     python add_admin.py
# ============================================================

services:

  # ── TimescaleDB (PostgreSQL 16 + TimescaleDB 2.x) ────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: nmsadmin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-monitoring_db}
      POSTGRES_USER:     ${POSTGRES_USER:-monitoring_man}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - nmsadmin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitoring_man} -d ${POSTGRES_DB:-monitoring_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nmsadmin_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - nmsadmin_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── NMS Admin Panel ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.nmsadmin
    container_name: nmsadmin_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment:
      DATABASE_URL:            postgresql+psycopg2://${POSTGRES_USER:-monitoring_man}:${POSTGRES_PASSWORD:-change_me_in_env}@db:5432/${POSTGRES_DB:-monitoring_db}
      REDIS_URL:               redis://redis:6379/0
      SECRET_KEY:              ${SECRET_KEY}
      FERNET_KEY:              ${FERNET_KEY}
      TRACKING_AGENT_API_KEY:  ${TRACKING_AGENT_API_KEY}
      SESSION_COOKIE_SECURE:   ${SESSION_COOKIE_SECURE:-false}
      WEB_HOST:                0.0.0.0
      WEB_PORT:                5000
      WEB_OPEN_BROWSER:        "false"
      SNMP_COMMUNITY:          ${SNMP_COMMUNITY:-public}
      SNMP_VERSION:            ${SNMP_VERSION:-2c}
      MONITORING_INTERVAL:     ${MONITORING_INTERVAL:-300}
      SMTP_SERVER:             ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT:               ${SMTP_PORT:-587}
      SMTP_USERNAME:           ${SMTP_USERNAME:-}
      SMTP_PASSWORD:           ${SMTP_PASSWORD:-}
    volumes:
      # Persist uploaded files and agent client uploads
      - nmsadmin_uploads:/app/client_uploads
      - nmsadmin_events:/app/events
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  nmsadmin_pgdata:
    driver: local
  nmsadmin_redis:
    driver: local
  nmsadmin_uploads:
    driver: local
  nmsadmin_events:
    driver: local
