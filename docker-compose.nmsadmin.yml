version: "3.9"

# ============================================================
# NMS Admin Panel - Production Docker Stack
#
# PREREQUISITE: Shared infrastructure must already be running via:
#   docker compose -f docker-compose.timescaledb.yml up -d
#
# That stack creates:
#   monitoring_timescaledb  PostgreSQL/TimescaleDB
#   monitoring_redis        Redis 7
#   monitoring_network      shared Docker network
#
# This stack adds:
#   app   NMS Admin Panel (Flask + Waitress, port 5000)
#
# Usage:
#   docker compose -f docker-compose.nmsadmin.yml up -d --build
#   Open http://<host>:5000
#
# First-run (create admin user):
#   docker compose -f docker-compose.nmsadmin.yml exec app python add_admin.py
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.nmsadmin
    container_name: nmsadmin_app
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5000}:5000"
    # Allows the container to reach services on the host when needed.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring_network
    environment:
      # Database - connects to the shared monitoring_timescaledb container.
      DATABASE_URL: >-
        postgresql+psycopg2://${POSTGRES_USER:-monitoring_man}:${POSTGRES_PASSWORD:-admin123}@monitoring_timescaledb:5432/${POSTGRES_DB:-monitoring_db}
      REQUIRE_POSTGRES_ONLY: "true"

      # Redis - connects to the shared Redis in docker-compose.timescaledb.yml.
      REDIS_URL: redis://redis:6379/0

      # Flask secrets
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      FERNET_KEY: ${FERNET_KEY:-}

      # Agent auth
      TRACKING_AGENT_API_KEY: ${TRACKING_AGENT_API_KEY:-}
      TRACKING_API_KEY: ${TRACKING_AGENT_API_KEY:-}
      MOBILE_API_KEY: ${MOBILE_API_KEY:-}

      # Web server
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "5000"
      WEB_OPEN_BROWSER: "false"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}

      # SNMP
      SNMP_COMMUNITY: ${SNMP_COMMUNITY:-public}
      SNMP_VERSION: ${SNMP_VERSION:-2c}
      MONITORING_INTERVAL: ${MONITORING_INTERVAL:-300}

      # SMTP
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # LDAP
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_SERVER: ${LDAP_SERVER:-ldap://host.docker.internal:389}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=example,dc=local}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-cn=admin,dc=example,dc=local}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USER_SEARCH_FILTER: ${LDAP_USER_SEARCH_FILTER:-(uid={username})}
      LDAP_USE_SSL: ${LDAP_USE_SSL:-false}
      LDAP_STARTTLS: ${LDAP_STARTTLS:-false}
      LDAP_TLS_VALIDATE: ${LDAP_TLS_VALIDATE:-CERT_NONE}
      LDAP_DEFAULT_ROLE: ${LDAP_DEFAULT_ROLE:-user}
      LDAP_ADMIN_GROUP: ${LDAP_ADMIN_GROUP:-}
      LDAP_ATTR_EMAIL: ${LDAP_ATTR_EMAIL:-mail}
      LDAP_ATTR_DISPLAY_NAME: ${LDAP_ATTR_DISPLAY_NAME:-displayName}
      LDAP_ATTR_GUID: ${LDAP_ATTR_GUID:-entryUUID}
      LDAP_GROUP_SEARCH_BASE: ${LDAP_GROUP_SEARCH_BASE:-}
      LDAP_GROUP_SEARCH_FILTER: ${LDAP_GROUP_SEARCH_FILTER:-(member={user_dn})}
      LDAP_CONNECT_TIMEOUT: ${LDAP_CONNECT_TIMEOUT:-5}
      LDAP_RECEIVE_TIMEOUT: ${LDAP_RECEIVE_TIMEOUT:-5}

      # Gemini AI (optional)
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_REPORT_INSIGHTS_ENABLED: ${GEMINI_REPORT_INSIGHTS_ENABLED:-false}

    volumes:
      - nmsadmin_uploads:/app/client_uploads
      - nmsadmin_events:/app/events
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  monitoring_network:
    external: true

volumes:
  nmsadmin_uploads:
    driver: local
  nmsadmin_events:
    driver: local
